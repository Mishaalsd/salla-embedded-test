<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تجربة Embedded SDK</title>
</head>
<body>
  <h1>تجربة Salla Embedded SDK</h1>
  <button id="toastBtn">أظهر رسالة</button>

  <!-- استدعاء مكتبة Embedded SDK -->
  <script src="https://cdn.salla.dev/embedded-sdk/1.0.0/salla-sdk.min.js"></script>
  <script>
    // تهيئة SDK
    const sdk = new SallaSDK({
      appId: "39856201", // لاحقًا تحط appId الخاص بتطبيقك
    });

    // إظهار رسالة toast عند الضغط على الزر
    document.getElementById("toastBtn").addEventListener("click", () => {
      sdk.ui.toast("تم الضغط على الزر! 🎉");
    });
  </script>
</body>
</html>
